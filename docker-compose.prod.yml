services:
  postgres:
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-reporting}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-in-production}
      POSTGRES_DB: ${POSTGRES_DB:-reporting_db}
    ports: []
    restart: unless-stopped

  backend:
    env_file:
      - .env.production
    environment:
      # Do not nest ${VAR:-...} inside another default (Compose often fails to expand it).
      # Use POSTGRES_* from .env.production (via --env-file) for this URL. For RDS, use a compose override
      # that sets DATABASE_URL and omit this key in the override.
      DATABASE_URL: postgresql://${POSTGRES_USER:-reporting}:${POSTGRES_PASSWORD:-reporting}@postgres:5432/${POSTGRES_DB:-reporting_db}
      UPLOAD_DIR: /data/uploads
      REPORTS_DIR: /data/reports
      DEBUG: "false"
    ports:
      - "127.0.0.1:8001:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      args:
        VITE_API_URL: ${VITE_API_URL:-https://example.com}
    ports:
      - "127.0.0.1:8080:80"
    restart: unless-stopped
