services:
  postgres:
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-reporting}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-in-production}
      POSTGRES_DB: ${POSTGRES_DB:-reporting_db}
    ports: []
    restart: unless-stopped

  backend:
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-reporting}:${POSTGRES_PASSWORD:-change-me-in-production}@postgres:5432/${POSTGRES_DB:-reporting_db}}
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY in your production env file}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://example.com}
      DEBUG: "false"
    ports:
      - "127.0.0.1:8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      args:
        VITE_API_URL: ${VITE_API_URL:-https://example.com}
    ports:
      - "127.0.0.1:8080:80"
    restart: unless-stopped
