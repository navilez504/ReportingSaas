services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: reporting
      POSTGRES_PASSWORD: reporting
      POSTGRES_DB: reporting_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reporting -d reporting_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://reporting:reporting@postgres:5432/reporting_db
      SECRET_KEY: ${SECRET_KEY:-change-me-use-long-random-secret-in-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:5173,http://127.0.0.1:5173}
      UPLOAD_DIR: /data/uploads
      REPORTS_DIR: /data/reports
      DEBUG: "false"
    volumes:
      - backend_uploads:/data/uploads
      - backend_reports:/data/reports
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
  backend_uploads:
  backend_reports:
