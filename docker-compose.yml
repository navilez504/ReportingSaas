services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-reporting}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-reporting}
      POSTGRES_DB: ${POSTGRES_DB:-reporting_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-reporting} -d ${POSTGRES_DB:-reporting_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # Load project `.env` into the container (SMTP, Stripe, ADMIN_EMAILS, etc.). Compose `${VAR:-}`
    # interpolation often does not see this file on all setups, which left SMTP_* empty before.
    env_file:
      - .env
    environment:
      # Overrides .env so the API talks to the compose Postgres service, not localhost.
      DATABASE_URL: postgresql://${POSTGRES_USER:-reporting}:${POSTGRES_PASSWORD:-reporting}@postgres:5432/${POSTGRES_DB:-reporting_db}
      UPLOAD_DIR: /data/uploads
      REPORTS_DIR: /data/reports
      DEBUG: "false"
    volumes:
      - backend_uploads:/data/uploads
      - backend_reports:/data/reports
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Empty = browser uses /api on the same host (nginx → backend). Set only for split static/API hosting.
        VITE_API_URL: ${VITE_API_URL:-}
    depends_on:
      - backend

volumes:
  pgdata:
  backend_uploads:
  backend_reports:
