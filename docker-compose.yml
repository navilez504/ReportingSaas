services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-reporting}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-reporting}
      POSTGRES_DB: ${POSTGRES_DB:-reporting_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-reporting} -d ${POSTGRES_DB:-reporting_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-reporting}:${POSTGRES_PASSWORD:-reporting}@postgres:5432/${POSTGRES_DB:-reporting_db}
      SECRET_KEY: ${SECRET_KEY:-change-me-use-long-random-secret-in-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:5173,http://127.0.0.1:5173}
      UPLOAD_DIR: /data/uploads
      REPORTS_DIR: /data/reports
      DEBUG: "false"
    volumes:
      - backend_uploads:/data/uploads
      - backend_reports:/data/reports
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    depends_on:
      - backend

volumes:
  pgdata:
  backend_uploads:
  backend_reports:
