# Host nginx in front of Docker (see docker-compose.prod.yml):
#   - Backend: 127.0.0.1:8001  (container port 8000)
#   - Frontend: 127.0.0.1:8080 (nginx in container, serves SPA + can proxy /api to backend)
#
# Prefer routing /api on the HOST to the backend so login/API never depends on the inner container proxy.
#
# Install:
#   sudo cp deploy/nginx/reportingsaas.conf /etc/nginx/sites-available/reportingsaas
#   sudo nano /etc/nginx/sites-available/reportingsaas   # set server_name
#   sudo ln -sf /etc/nginx/sites-available/reportingsaas /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# For a raw public IP only, use: server_name _;

server {
    listen 80;
    # Replace with your domain or use "_" for default (IP access).
    server_name example.com www.example.com;

    client_max_body_size 50m;

    # API: pass full URI to FastAPI (routes are /api/...)
    location /api {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # SPA (built assets; inner nginx also proxies /api to backend if needed)
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
